<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>spider mesh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    :root { --sz: 422px; }
    @media (min-width: 1440px) { :root { --sz: 576px; } }
    @media (max-width: 480px)  { :root { --sz: 322px; } }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: #101010;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-family: system-ui, sans-serif; cursor: none;
    }
    #wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    canvas {
      width: var(--sz); height: var(--sz);
      display: block;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c" width="500" height="500"></canvas>
  </div>
<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const W = 500, H = 500;

  // ── Params ────────────────────────────────────────────────────────────────
  const GRID_SPACING   = 38;
  const PAD            = 22;
  const NEIGHBOR_COUNT = 18;
  const MAX_DIST       = 220;
  const PULL_STR       = 0.22;
  const PULL_ELASTIC   = 0.15;
  const FADE_IN        = 0.25;
  const FADE_OUT       = 0.08;
  const HUB_SIZE       = 4;
  const DOT_MIN        = 1.5;
  const DOT_MAX        = 6;

  // ── Ripple ────────────────────────────────────────────────────────────────
  const RIPPLE_DURATION  = 3600;
  const RIPPLE_SPEED     = 0.6;
  const RIPPLE_AMPLITUDE = 14;
  const RIPPLE_FREQUENCY = 0.08;
  const RIPPLE_DAMPING   = 0.0008;

  const activeRipples = [];

  function rippleOffset(node, now) {
    let dx = 0, dy = 0;
    for (const r of activeRipples) {
      const dist    = Math.hypot(node.x - r.x, node.y - r.y);
      const elapsed = now - r.startTime;
      if (elapsed < 0 || elapsed > r.duration) continue;
      const radius   = elapsed * r.speed;
      const band     = dist - radius;
      const width    = 100;
      const t        = band / width;
      if (Math.abs(t) > 1.2) continue;
      const envelope    = Math.max(0, Math.cos(t * Math.PI * 0.5));
      const temporal    = Math.exp(-elapsed * RIPPLE_DAMPING);
      let offset        = r.amplitude * envelope * temporal;
      const tail        = -Math.sin((band / width) * Math.PI * 0.5) * 0.75;
      const tailTemporal = Math.exp(-elapsed * RIPPLE_DAMPING * 1.2);
      offset += r.amplitude * tail * temporal * tailTemporal * RIPPLE_FREQUENCY;
      offset *= 1 + 0.5 * Math.sin(elapsed * 0.01);
      const len = Math.hypot(node.x - r.x, node.y - r.y) || 1;
      dx += ((node.x - r.x) / len) * offset;
      dy += ((node.y - r.y) / len) * offset;
    }
    return { dx, dy };
  }

  // ── Particle ──────────────────────────────────────────────────────────────
  class Particle {
    constructor(x, y, id) {
      this.x = x; this.y = y; this.id = id;
      this.displayX = x; this.displayY = y;
      this.scale = 1; this.opacity = 0.3;
      this.targetScale = 1; this.targetOpacity = 0.3;
      this.isActive = false;
    }
    update() {
      this.displayX += (this.x - this.displayX) * 0.15;
      this.displayY += (this.y - this.displayY) * 0.15;
      const spd = this.isActive ? FADE_IN : FADE_OUT;
      this.scale   += (this.targetScale   - this.scale)   * spd;
      this.opacity += (this.targetOpacity - this.opacity) * spd;
    }
    draw(ox, oy, alphaOverride) {
      const size = DOT_MIN + (DOT_MAX - DOT_MIN) * ((this.scale - 1) / 2);
      const x    = this.displayX + ox;
      const y    = this.displayY + oy;
      ctx.globalAlpha = alphaOverride ?? this.opacity;
      ctx.fillRect(x - size / 2, y - size / 2, size, size);
    }
  }

  // ── Grid ──────────────────────────────────────────────────────────────────
  const particles        = [];
  const shimmerStrengths = [];
  {
    const cols = Math.floor((W - PAD * 2) / GRID_SPACING) + 1;
    const rows = Math.floor((H - PAD * 2) / GRID_SPACING) + 1;
    let id = 0;
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        particles.push(new Particle(PAD + c * GRID_SPACING, PAD + r * GRID_SPACING, id));
        shimmerStrengths.push(0);
        id++;
      }
  }

  function particlePhase(id) {
    const s = Math.sin(id * 12.9898) * 43758.5453;
    return s - Math.floor(s);
  }

  // ── Color cycling ─────────────────────────────────────────────────────────
  const COLORS = ['#ffffff', '#ff6b35', '#ffd93b', '#2ecc71', '#3498db', '#9b59b6'];
  let colorIndex = 0;
  let meshColor  = COLORS[0];

  // ── State ─────────────────────────────────────────────────────────────────
  let cursorX = -1000, cursorY = -1000, cursorActive = false;
  let currentNeighbors = [];
  let lastRippleTimeMs = -Infinity;

  // ── Events ────────────────────────────────────────────────────────────────
  canvas.addEventListener('mousemove', e => {
    const r   = canvas.getBoundingClientRect();
    cursorX   = (e.clientX - r.left) * (W / r.width);
    cursorY   = (e.clientY - r.top)  * (H / r.height);
    cursorActive = true;
  });
  canvas.addEventListener('mouseleave', () => { cursorActive = false; });

  canvas.addEventListener('contextmenu', e => {
    e.preventDefault();
    colorIndex = (colorIndex + 1) % COLORS.length;
    meshColor  = COLORS[colorIndex];
  });

  canvas.addEventListener('click', e => {
    const r  = canvas.getBoundingClientRect();
    const cx = (e.clientX - r.left) * (W / r.width);
    const cy = (e.clientY - r.top)  * (H / r.height);
    activeRipples.length = 0;
    const now = performance.now();
    activeRipples.push({ x: cx, y: cy, startTime: now, duration: RIPPLE_DURATION,
                         speed: RIPPLE_SPEED, amplitude: RIPPLE_AMPLITUDE });
    lastRippleTimeMs = now;
    playClick();
  });

  // ── Audio ─────────────────────────────────────────────────────────────────
  let clickAudio = null;
  function initAudio() {
    if (clickAudio) return;
    clickAudio = new Audio('./sounds/selection.mp3');
    clickAudio.volume = 0.42;
  }
  function playClick() { initAudio(); clickAudio.currentTime = 0; clickAudio.play().catch(()=>{}); }

  // ── Update ────────────────────────────────────────────────────────────────
  function update() {
    const distances = particles.map(p => ({
      p, d: Math.hypot(p.x - cursorX, p.y - cursorY)
    }));

    currentNeighbors = cursorActive
      ? distances.filter(x => x.d < MAX_DIST)
                 .sort((a, b) => a.d - b.d)
                 .slice(0, NEIGHBOR_COUNT)
                 .map(x => x.p)
      : [];

    const neighborIds   = new Set(currentNeighbors.map(p => p.id));
    const pullFactor    = 1 + PULL_ELASTIC;

    particles.forEach(p => {
      p.isActive = neighborIds.has(p.id);
      if (p.isActive) {
        const dx = cursorX - p.x, dy = cursorY - p.y;
        p.displayX += (p.x + dx * PULL_STR - p.displayX) * pullFactor;
        p.displayY += (p.y + dy * PULL_STR - p.displayY) * pullFactor;
        p.targetScale   = 3;
        p.targetOpacity = 1;
      } else {
        p.targetScale   = 1;
        p.targetOpacity = 0.3;
      }
      p.update();
    });

    // Remove expired ripples
    const now = performance.now();
    for (let i = activeRipples.length - 1; i >= 0; i--)
      if (now - activeRipples[i].startTime > activeRipples[i].duration)
        activeRipples.splice(i, 1);
  }

  // ── Draw ──────────────────────────────────────────────────────────────────
  function draw(now) {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#101010';
    ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.roundRect(0, 0, W, H, 10); ctx.fill();

    ctx.save();
    ctx.translate(0.5, 0.5);
    ctx.fillStyle   = meshColor;
    ctx.strokeStyle = meshColor;

    const hubOff = rippleOffset({ x: cursorX, y: cursorY }, now);
    const hx = cursorX + hubOff.dx;
    const hy = cursorY + hubOff.dy;

    const shimmerDecayMs = 5000;
    const sinceRipple    = now - lastRippleTimeMs;
    const shimmerTemporal = (sinceRipple >= 0 && lastRippleTimeMs !== -Infinity)
      ? Math.exp(-sinceRipple / shimmerDecayMs) : 0;

    // Lines from hub to neighbors
    ctx.lineWidth = 1;
    currentNeighbors.forEach(p => {
      const pOff = rippleOffset(p, now);
      const px   = p.displayX + pOff.dx;
      const py   = p.displayY + pOff.dy;
      const dist = Math.hypot(p.displayX - cursorX, p.displayY - cursorY);
      ctx.globalAlpha = Math.max(0.3, 1 - dist / MAX_DIST) * 0.75;
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(px, py);
      ctx.stroke();
    });
    ctx.globalAlpha = 1;

    // All particles
    particles.forEach((p, index) => {
      const off = rippleOffset(p, now);
      let alphaOverride;

      if (!p.isActive && shimmerTemporal > 0) {
        const rippleMag = Math.hypot(off.dx, off.dy);
        const local     = Math.min(1, rippleMag / 9);
        let stored      = shimmerStrengths[index] ?? 0;
        if (local > 0.02) stored = Math.min(1, stored + local * 0.9);
        stored *= 0.975 + 0.02 * shimmerTemporal;
        shimmerStrengths[index] = stored;

        if (stored > 0.01) {
          const phase    = particlePhase(p.id) * Math.PI * 2;
          const twinkle  = 0.5 + 0.5 * Math.sin(phase + now * 0.01);
          alphaOverride  = Math.min(1, p.opacity + 0.9 * stored * twinkle);
        }
      }

      p.draw(off.dx, off.dy, alphaOverride);
    });

    // Hub square at cursor
    if (currentNeighbors.length > 0) {
      ctx.globalAlpha = 1;
      const h = HUB_SIZE / 2;
      ctx.fillRect(hx - h, hy - h, HUB_SIZE, HUB_SIZE);
    }

    ctx.restore();
  }

  // ── Loop ──────────────────────────────────────────────────────────────────
  function loop(now) {
    update();
    draw(now);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
